    const min = Math.min(...history) * 0.9;
    const max = Math.max(...history) * 1.1;
    const range = (max - min) === 0 ? 1 : (max - min); 
    const points = history.map((val, i) => `${(i / (history.length - 1)) * 100},${100 - ((val - min) / range) * 100}`).join(' ');
    return (
        <div className="w-full h-32 bg-black border-2 border-gray-600 p-1 relative">
            <div className="absolute inset-0 grid grid-cols-4 grid-rows-4">{[...Array(16)].map((_, i) => <div key={i} className="border border-[#333333]"></div>)}</div>
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full relative z-10"><polyline fill="none" stroke="#00ff00" strokeWidth="2" points={points}/></svg>
            <div className="absolute top-1 left-1 text-[10px] text-white font-mono bg-black/50 px-1">{trend} MARKET</div>
        </div>
    );

      let rawRevenue = companies.reduce((acc, c) => acc + c.revenue, 0);
      let cooBonusRevenue = staff.coo ? rawRevenue * (staff.coo.skill * 0.02) : 0;
      const totalRevenue = rawRevenue + cooBonusRevenue;

      const cogs = totalRevenue * 0.25; 
      const opEx = companies.reduce((acc, c) => acc + (c.revenue * (c.optimized ? 0.2 : 0.4)), 0); 
      
      let staffCost = 0;
      if (staff.cfo) staffCost += staff.cfo.salary;
      if (staff.coo) staffCost += staff.coo.salary;
      if (staff.pr) staffCost += staff.pr.salary;

      const grossProfit = totalRevenue - cogs;
      const ebit = grossProfit - opEx - staffCost;
      const preTaxIncome = ebit - monthlyInterest;
      const tax = preTaxIncome > 0 ? preTaxIncome * 0.2 : 0; 
      const netIncome = preTaxIncome - tax;
      
      const assetsValue = companies.reduce((acc, c) => acc + (c.price || c.revenue * 5), 0) + cash;
      const equity = assetsValue - debt;

      return { 
          rawRevenue, cooBonusRevenue, totalRevenue, 
          cogs, grossProfit, opEx, staffCost, ebit, 
          baseRate, cfoBonusRate, finalInterestRate, baseInterest, cfoInterestSaved, monthlyInterest, 
          preTaxIncome, tax, netIncome, assetsValue, equity 
      };
  };

  const getPortfolioStats = () => {
      return companies.reduce((acc, c) => {
          acc.totalRevenue += c.revenue;
          acc.sectors[c.sector] = (acc.sectors[c.sector] || 0) + 1;
          return acc;
      }, { totalRevenue: 0, sectors: {} });
  };
  
  const getMarketInfo = () => {
      if (character?.id === 'wyler') return { exchange: 'NYSE', currency: '$' };
      if (character?.id === 'jett') return { exchange: 'NASDAQ', currency: '$' };
      return { exchange: 'MARKET', currency: '$' };
  };

  const financials = calculateFinancials();
  const portfolioStats = getPortfolioStats();
  const marketInfo = getMarketInfo();
  const currentDate = new Date(1999, turn - 1, 1).toLocaleDateString('en-US', { month: 'short', year: '2-digit' }).toUpperCase();
  const currentInterestRate = financials.finalInterestRate;
  const maxLeverage = character?.id === 'grimani' ? 1500 : 500;

  // Watcher per Game Over
  useEffect(() => {
      if (screen !== 'game') return;
      if (stress >= 100 || cash <= -100 || legalRisk >= 100) {
          setScreen('gameover');
          saveRecord('GAME OVER', financials.netIncome);
      }
  }, [stress, cash, legalRisk, screen]);

  let passiveStressRelief = 0;
  if (luxuries.watch) passiveStressRelief += 1;
  if (luxuries.jet) passiveStressRelief += 5;
  if (luxuries.island) passiveStressRelief += 15;

  const addLog = (msg) => {
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      setLogs(prev => [...prev, { id: `${Date.now()}-${Math.random()}`, text: `[${time}] ${msg}` }]);
  };

  const startGame = (charKey) => {
      const char = archetypes[charKey];
      setCharacter(char); setCash(char.startCash); setDebt(char.startDebt); setStress(char.startStress);
      setLegalRisk(0); setCompanies([]); setTurn(1); setMarketTrend('FLAT'); setStockPrice(10.00);
      setStockHistory([10.00, 10.00, 10.00, 10.00, 10.00]); setStaff({ cfo: null, coo: null, pr: null });
      setLuxuries({ watch: false, club: false, jet: false, island: false });
      setGrimaniRateTurns(0); 
      setHasWon(false);
      setLogs([{ id: 'start-0', text: `LOGIN: ${char.name} // CONNECTED` }]); setScreen('game');
  };

  const handleScout = () => {
      if (debt > maxLeverage) { addLog(`ERROR: DEBT EXCEEDS $${maxLeverage}M LIMIT. REPAY DEBT.`); return; }
      if (target) { addLog("TARGET BUFFER FULL"); return; }
      
      let scoutTrend = marketTrend;
      if (insiderIntel) { scoutTrend = insiderIntel; setInsiderIntel(null); }
      
      // Filtra le aziende per assicurarsi di non pescare doppioni
      const availableCompanies = companyNames.filter(cn => !companies.some(c => c.name === cn.name));
      const base = availableCompanies.length > 0 ? availableCompanies[Math.floor(Math.random() * availableCompanies.length)] : companyNames[Math.floor(Math.random() * companyNames.length)];
      
      const size = Math.floor(Math.random() * 200) + 50; 
      let priceMult = scoutTrend === 'BULL' ? 1.3 : scoutTrend === 'BEAR' ? 0.7 : 1;

      let rating = 'FAIR VALUE';
      if (priceMult > 1) rating = 'OVERPRICED';
      if (priceMult < 1) rating = 'UNDERVALUED';

      const price = Math.floor((size * (Math.random() * 0.5 + 0.8)) * priceMult); 
      const revenue = Math.floor(price * (Math.random() * 0.15 + 0.10)); 

      setTarget({ id: Date.now(), name: base.name, sector: base.type, price, revenue, optimized: false, rating });
      addLog(`SCAN: ${base.name} DETECTED`);
  };

  const handleBuy = (method) => {
      if (!target) return;
      if (method === 'cash') {
          if (cash >= target.price) { setCash(c => c - target.price); completeAcquisition(target); } 
          else addLog("ERROR: INSUFFICIENT CASH");
      } else {
          if (debt + target.price <= maxLeverage) { setDebt(d => d + target.price); completeAcquisition(target); } 
          else addLog("ERROR: CREDIT LIMIT EXCEEDED");
      }
  };

  const completeAcquisition = (company) => {
      let finalRevenue = company.revenue;
      if (character.id === 'wyler') setCash(prev => prev + Math.floor(company.price * 0.20));
      else if (character.id === 'jett') finalRevenue = Math.floor(finalRevenue * 1.4);

      setCompanies(prev => [...prev, { ...company, revenue: finalRevenue }]);
      setStress(s => s + 15); setTarget(null); addLog(`ACQUIRED: ${company.name}`);
  };

  const useCharacterAbility = () => {
      if (character.id === 'wyler') {
          const unopt = companies.filter(c => !c.optimized).length;
          if (unopt === 0) { addLog("NO FAT TO TRIM."); return; }
          setCompanies(prev => prev.map(c => ({ ...c, optimized: true })));
          setStress(s => s + (unopt * 5)); addLog(`PURGED ${unopt} DIVISIONS. OPEX REDUCED.`);
      } 
      else if (character.id === 'jett') {
          if (cash < 50) { addLog("NEED $50M FOR EVENT."); return; }
          setCash(c => c - 50); setStockPrice(p => p * 1.15); setStress(s => Math.max(0, s - 10)); addLog("KEYNOTE SUCCESS. STOCK +15%.");
      }
      else if (character.id === 'grimani') {
          if (cash < 30) { addLog("NEED $30M TO RESTRUCTURE DEBT."); return; }
          if (grimaniRateTurns > 0) { addLog("DEBT ALREADY RESTRUCTURED."); return; }
          setCash(c => c - 30);
          setGrimaniRateTurns(3); 
          addLog("DEBT RESTRUCTURED. 1% INTEREST FOR 3 MONTHS.");
      }
  };

  const borrowMoney = () => {
      if (debt + 50 > maxLeverage) { addLog(`BANK: CREDIT LINE REFUSED.`); return; }
      setDebt(d => d + 50);
      setCash(c => c + 50);
      addLog(`BANK: BORROWED $50M AT ${(currentInterestRate*100).toFixed(1)}%`);
  };

  const repayDebt = (amount) => {
      if (debt <= 0) return;
      let actualRepay = Math.min(amount, cash, debt);
      if (actualRepay <= 0) { addLog("BANK: INSUFFICIENT FUNDS"); return; }
      
      setCash(c => c - actualRepay); 
      setDebt(d => d - actualRepay); 
      setStress(s => Math.max(0, s - 2)); 
      addLog(`BANK: REPAID $${actualRepay.toFixed(1)}M DEBT`);
  };

  const purchaseLuxury = (item, cost, name) => {
      if (cash < cost) { addLog("SHOP: INSUFFICIENT FUNDS"); return; }
      setCash(c => c - cost);
      setLuxuries(prev => ({ ...prev, [item]: true }));
      addLog(`SHOP: PURCHASED ${name} FOR $${cost}M`);
  };

  const handleNewsDecision = (decision) => {
      if (!activeNews) return;
      let msg = "";
      if (decision === 'SELL_ALL') {
          const sectorCompanies = companies.filter(c => c.sector === activeNews.sector);
          const otherCompanies = companies.filter(c => c.sector !== activeNews.sector);
          if (sectorCompanies.length > 0) {
              let totalSale = 0;
              sectorCompanies.forEach(c => { totalSale += (c.revenue * 8) * (activeNews.type === 'BOOM' ? 1.5 : 0.6); });
              setCompanies(otherCompanies); setCash(c => c + totalSale); msg = `LIQUIDATED ASSETS: $${totalSale.toFixed(0)}M`;
          } else { msg = "NO ASSETS IN SECTOR"; }
      } else if (decision === 'BUY_MORE') {
          if (cash >= 50) {
              setCash(c => c - 50);
              const newCo = { id: Date.now(), name: `QUICK ${activeNews.sector} ACQ.`, sector: activeNews.sector, revenue: activeNews.type === 'BOOM' ? 15 : 5, price: 50, optimized: false };
              setCompanies(prev => [...prev, newCo]); msg = `PANIC BOUGHT ASSET`;
          } else { msg = "INSUFFICIENT FUNDS"; }
      } else { msg = "POSITION HELD."; }
      
      addLog(`STRATEGY: ${msg}`); setShowNewsPopup(false); setActiveNews(null);
  };

  const sellAsset = (id) => {
      const company = companies.find(c => c.id === id);
      if (!company) return;
      const saleValue = Math.floor(company.revenue * (marketTrend === 'BULL' ? 12 : marketTrend === 'BEAR' ? 5 : 8));
      setCash(c => c + saleValue); setCompanies(companies.filter((c) => c.id !== id)); addLog(`SOLD ${company.name} FOR $${saleValue}M`);
  };

  const hireStaff = (role) => {
      if (cash < 5) { addLog("NEED $5M BONUS"); return; }
      const newStaff = { name: `Agent ${Math.floor(Math.random()*999)}`, skill: Math.floor(Math.random()*5)+1, salary: Math.floor(Math.random()*2)+1 };
      setCash(c => c - 5); setStaff(prev => ({ ...prev, [role]: newStaff })); addLog(`HIRED ${newStaff.name} AS ${role.toUpperCase()}`);
  };
  
  const fireStaff = (role) => { setStaff(prev => ({ ...prev, [role]: null })); setStress(s => s + 5); addLog(`FIRED ${role.toUpperCase()}`); };

  const useInsiderTrading = () => {
      if (cash < 10) { addLog("NEED $10M WIRE"); return; }
      setCash(c => c - 10); setLegalRisk(r => r + Math.floor(Math.random() * 15) + 5);
      const nextTrend = Math.random() > 0.5 ? (Math.random() > 0.5 ? 'BULL' : 'BEAR') : 'FLAT';
      setInsiderIntel(nextTrend); addLog(`INTEL: MARKET WILL BE ${nextTrend}`);
  };

  const processEventOption = (option) => {
      let s = { cash, stress, legalRisk, stockMultiplier: 1, fireCFO: false, fireCOO: false, firePR: false };
      const msg = option.action(s);
      setCash(s.cash); setStress(s.stress); setLegalRisk(s.legalRisk);
      if (s.stockMultiplier !== 1) { setStockPrice(p => parseFloat((p * s.stockMultiplier).toFixed(2))); }
      if (s.fireCFO) setStaff(prev => ({ ...prev, cfo: null }));
      if (s.fireCOO) setStaff(prev => ({ ...prev, coo: null }));
      if (s.firePR) setStaff(prev => ({ ...prev, pr: null }));
      addLog(`EVENT: ${msg}`); setActiveEvent(null);
  };

  const nextTurn = () => {
      const net = financials.netIncome;
      setCash(prev => prev + net);
      
      let stressRelief = passiveStressRelief;
      if (staff.pr) stressRelief += staff.pr.skill;
      setStress(s => Math.max(0, s - stressRelief));

      setStress(s => s + 5); 
      setLegalRisk(r => Math.max(0, r - 2)); 
      setTurn(t => t + 1);
      
      addLog(`CYCLE END: NET ${net >= 0 ? '+' : ''}$${net.toFixed(1)}M`);
      
      if (grimaniRateTurns > 0) {
          setGrimaniRateTurns(prev => prev - 1);
          if (grimaniRateTurns === 1) addLog("WARNING: SPECIAL 1% INTEREST RATE EXPIRED");
      }

      if (luxuries.club && Math.random() < 0.20 && !insiderIntel) {
          const trends = ['BULL', 'BEAR', 'FLAT'];
          const intel = trends[Math.floor(Math.random() * trends.length)];
          setInsiderIntel(intel);
          addLog("CLUB: OVERHEARD INSIDER INTEL", "success");
      }

      if (insiderIntel) { setMarketTrend(insiderIntel); setInsiderIntel(null); }
      else if (Math.random() < 0.2) setMarketTrend(['BULL', 'BEAR', 'FLAT'][Math.floor(Math.random()*3)]);

      if (Math.random() > 0.3) {
          const sectors = ["Tech", "Pharma", "Defense", "Software", "Bio", "Science", "Space", "Food"];
          const sector = sectors[Math.floor(Math.random() * sectors.length)];
          const type = Math.random() > 0.5 ? 'BOOM' : 'CRASH';
          const title = type === 'BOOM' ? `${sector} SECTOR RALLY` : `${sector} BUBBLE BURSTS`;
          setActiveNews({ title, sector, type });
      } else { setActiveNews(null); }
      
      let vol = (Math.random() * 0.1) - 0.05;
      if (marketTrend === 'BULL') vol += 0.05; if (marketTrend === 'BEAR') vol -= 0.05;
      const newPrice = parseFloat(Math.max(1, stockPrice * (1 + vol)).toFixed(2));
      setStockPrice(newPrice); setStockHistory(prev => [...prev.slice(-19), newPrice]);

      if (Math.random() < 0.25 && !activeEvent) {
          let events = [
              { id: 1, title: "STRIKE ACTION", desc: "Workers demanding raise.", options: [{ label: "GRANT RAISE", action: (s) => { s.stress -= 5; return "DEAL REACHED"; } }, { label: "SEND SECURITY", action: (s) => { s.cash -= 5; s.stress += 10; return "BROKEN BY FORCE"; } }] },
              { id: 2, title: "SCANDAL", desc: "Toxic spill detected.", options: [{ label: "HUSH MONEY", action: (s) => { s.cash -= 15; return "SILENCED"; } }, { label: "ADMIT FAULT", action: (s) => { s.stockMultiplier = 0.8; return "STOCK CRASH"; } }] }
          ];

          if (staff.pr) {
              events.find(e => e.id === 2).options.push({ label: "SPIN NARRATIVE (PR ABILITY)", action: (s) => { return "CRISIS AVERTED VIA PR SPIN"; } });
          }

          if (staff.cfo) {
              events.push({ id: 3, title: "FRODE CONTABILE", desc: "La SEC sospetta il CFO di truccare i conti.", options: [{ label: "LICENZIA CFO (-$10M)", action: (s) => { s.cash -= 10; s.fireCFO = true; return "CFO LICENZIATO E MULTA PAGATA"; } }, { label: "COPRI IL CFO (+30% Rischio)", action: (s) => { s.legalRisk += 30; return "INDAGINI INSABBIATE. RISCHIO ALTO"; } }] });
          }
          
          if (staff.coo) {
              events.push({ id: 4, title: "VIOLAZIONI SICUREZZA", desc: "Il COO forza ritmi massacranti ignorando le norme.", options: [{ label: "LICENZIA COO (+15 Stress)", action: (s) => { s.stress += 15; s.fireCOO = true; return "CAPRO ESPIATORIO SACRIFICATO"; } }, { label: "CORROMPI ISPETTORI (-$15M, +20% Rischio)", action: (s) => { s.cash -= 15; s.legalRisk += 20; return "ISPETTORI CORROTTI"; } }] });
          }

          if (staff.pr) {
              events.push({ id: 5, title: "RICATTO AI GIORNALISTI", desc: "Il tuo PR usa fondi neri per insabbiare notizie.", options: [{ label: "LICENZIA PR (Stock -10%)", action: (s) => { s.stockMultiplier = 0.9; s.firePR = true; return "PR LICENZIATO. AZIONI IN CALO"; } }, { label: "NEGA TUTTO (+25% Rischio)", action: (s) => { s.legalRisk += 25; return "L'FBI INIZIA A INDAGARE"; } }] });
          }

          setActiveEvent(events[Math.floor(Math.random() * events.length)]);
      }

      if (net >= WIN_INCOME_CONDITION && !hasWon) {
          setScreen('win');
          saveRecord('VICTORY', net);
      }
  };

  const getAIAdvice = async () => {
      if (!character) return;
      setIsAdvisorLoading(true); setAdvisorData("");
      try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: `Sei il CDA. Giocatore: ${character.name}. Cash: ${(cash || 0).toFixed(0)}M. Rischio: ${legalRisk}. Consiglio breve e cinico.` }] }] })
          });
          const data = await response.json();
          setAdvisorData(data.candidates?.[0]?.content?.parts?.[0]?.text || "NO CONNECTION.");
      } catch (e) { setAdvisorData("LINK ERROR."); } finally { setIsAdvisorLoading(false); }
  };

  const StaffCardHelper = ({ role, data }) => (
      <div className="border border-gray-500 p-2 mb-2 bg-white">
          <div className="flex justify-between font-bold border-b border-gray-300 mb-1">
              <span>{role.toUpperCase()}</span>
              {data ? <span className="text-blue-800">{data.name}</span> : <span className="text-red-500">VACANT</span>}
          </div>
          {data ? (
              <div className="text-xs">
                  <div>RATING: {"⭐".repeat(data.skill)}</div><div>COST: ${data.salary}M/mo</div>
                  <button onClick={() => fireStaff(role)} className="mt-1 bg-red-600 text-white px-2 py-1 w-full text-[10px]">TERMINATE</button>
              </div>
          ) : <button onClick={() => hireStaff(role)} className="mt-1 bg-green-700 text-white px-2 py-1 w-full text-[10px] border border-green-900 border-b-black border-r-black">RECRUIT ($5M)</button>}
      </div>
  );

  // --- RENDER ---
  if (screen === 'start') {
      if (menuScreen === 'main') {
          return (
              <div className="min-h-screen bg-[#008080] flex items-center justify-center p-4 font-sans text-sm">
                  <Win95Window title="SYSTEM_BOOT.EXE" icon={Briefcase} className="w-80 shadow-2xl">
                      <div className="p-6 bg-[#c0c0c0] flex flex-col items-center border-2 border-white border-r-gray-500 border-b-gray-500 m-1">
                          <h1 className="text-2xl font-black mb-1 text-center text-[#000080] leading-tight">CORPORATE RAIDER SIMULATOR</h1>
                          <p className="text-xs font-bold text-gray-600 mb-8 border-b border-gray-400 pb-2 w-full text-center">Corporate OS v1.0</p>
                          
                          <RetroButton onClick={() => setMenuScreen('newGame')} className="mb-3 py-3 text-lg">NEW GAME</RetroButton>
                          <RetroButton onClick={() => setMenuScreen('records')} className="mb-3 py-2">RECORDS</RetroButton>
                          <RetroButton onClick={() => setMenuScreen('about')} className="mb-2 py-2">ABOUT THE GAME</RetroButton>
                      </div>
                  </Win95Window>
              </div>
          );
      }

      if (menuScreen === 'records') {
          return (
              <div className="min-h-screen bg-[#008080] flex items-center justify-center p-4 font-sans text-sm">
                  <Win95Window title="DATABASE_RECORDS.DAT" icon={FileText} className="max-w-3xl w-full h-[400px] shadow-2xl">
                      <div className="p-4 bg-white border-2 border-gray-600 border-r-white border-b-white h-full overflow-y-auto flex flex-col m-1">
                          <h2 className="font-bold text-lg mb-4 border-b border-gray-400 pb-2">ARCHIVIO SCALATE FINANZIARIE</h2>
                          {records.length === 0 ? (
                              <p className="text-gray-500 italic text-center mt-10">Nessun record trovato nel database locale.</p>
                          ) : (
                              <table className="w-full text-xs font-[Arial] border-collapse mb-4">
                                  <thead>
                                      <tr className="bg-[#c0c0c0] text-left">
                                          <th className="border border-gray-500 p-2">DATA</th>
                                          <th className="border border-gray-500 p-2">AZIENDA</th>
                                          <th className="border border-gray-500 p-2">CEO (PROFILO)</th>
                                          <th className="border border-gray-500 p-2 text-center">MESE</th>
                                          <th className="border border-gray-500 p-2 text-right">PROFITTO FINALE</th>
                                          <th className="border border-gray-500 p-2 text-center">ESITO</th>
                                      </tr>
                                  </thead>
                                  <tbody>
                                      {records.map(r => (
                                          <tr key={r.id} className="hover:bg-gray-100">
                                              <td className="border border-gray-300 p-2">{r.date}</td>
                                              <td className="border border-gray-300 p-2 font-bold">{r.company}</td>
                                              <td className="border border-gray-300 p-2">{r.player} ({r.character})</td>
                                              <td className="border border-gray-300 p-2 text-center">{r.turns}</td>
                                              <td className="border border-gray-300 p-2 font-mono text-blue-700 font-bold text-right">${r.profit.toFixed(1)}M</td>
                                              <td className={`border border-gray-300 p-2 font-bold text-center ${r.result === 'VICTORY' ? 'text-green-600' : 'text-red-600'}`}>{r.result}</td>
                                          </tr>
                                      ))}
                                  </tbody>
                              </table>
                          )}
                          <div className="mt-auto pt-4 text-center">
                              <RetroButton onClick={() => setMenuScreen('main')} className="!w-auto inline-block px-8">TORNA AL MENU</RetroButton>
                          </div>
                      </div>
                  </Win95Window>
              </div>
          );
      }

      if (menuScreen === 'about') {
          return (
              <div className="min-h-screen bg-[#008080] flex items-center justify-center p-4 font-sans text-sm">
                  <Win95Window title="ABOUT.TXT" icon={FileText} className="max-w-md w-full shadow-2xl">
                      <div className="p-6 bg-white border-2 border-gray-600 border-r-white border-b-white font-mono text-xs text-black m-1">
                          <h2 className="text-lg font-bold mb-4 border-b-2 border-black pb-1">CORPORATE RAIDER SIMULATOR</h2>
                          <p className="mb-3 leading-relaxed">Late 1990s. A decade ruled by greed.</p>
                          <p className="mb-3 leading-relaxed">In a world of market speculation and huge profits, finance is a jungle and you are one of its most dangerous players.</p>
                          <p className="mb-3 leading-relaxed">Build companies from the ground up, take apart businesses piece by piece, and seize every opportunity before anyone else.</p>
                          <p className="mb-3 leading-relaxed">But nothing comes for free: the higher you rise, the greater the pressure.<br/>Stress is constant, authorities start watching you… and one mistake can cost you everything.</p>
                          <p className="mb-3 leading-relaxed">CORPORATE RAIDER SIMULATOR is a strategy game set in the golden age of finance, where ambition and risk go hand in hand.</p>
                          <p className="mb-6 leading-relaxed"><u>Objective:</u> reach $500 million in net monthly profit and prove that in the game of power… <b>there are no rules, only winners.</b></p>
                          <div className="text-center">
                              <RetroButton onClick={() => setMenuScreen('main')} className="!w-auto inline-block px-8">CHIUDI</RetroButton>
                          </div>
                      </div>
                  </Win95Window>
              </div>
          );
      }

      if (menuScreen === 'newGame') {
          const selectedChar = archetypes[archetypeKeys[charIndex]];
          return (
              <div className="min-h-screen bg-[#008080] flex items-center justify-center p-4 font-sans text-sm">
                  <Win95Window title="NEW_GAME.EXE" icon={Briefcase} className="max-w-4xl w-full h-[450px] shadow-2xl">
                      <div className="flex h-full p-2 gap-2">
                          <div className="w-1/2 bg-[#c0c0c0] border-2 border-white border-r-gray-600 border-b-gray-600 p-6 flex flex-col">
                              <h2 className="font-bold mb-6 text-xl border-b border-gray-400 pb-2 flex items-center gap-2"><Users size={20}/> REGISTRAZIONE OPERATORE</h2>
                              
                              <label className="font-bold text-xs mb-1 text-gray-800">NOME CEO:</label>
                              <input type="text" value={playerName} onChange={e=>setPlayerName(e.target.value)} className="bg-white border-2 border-gray-600 border-r-white border-b-white p-2 mb-6 font-mono text-sm outline-none w-full shadow-inner uppercase" placeholder="Es. Gordon Gekko" maxLength="20" />

              <div className="absolute bottom-12 left-1/2 -translate-x-1/2 md:left-40 md:translate-x-0 z-50 w-64">
                  <Win95Window title="HR_DEPARTMENT.EXE" icon={Users} onClose={()=>setShowStaff(false)}>
                      <div className="p-2 space-y-2">
                        <StaffCardHelper role="cfo" data={staff.cfo} />
                        <StaffCardHelper role="coo" data={staff.coo} />
                        <StaffCardHelper role="pr" data={staff.pr} />
                      </div>
                  </Win95Window>
              </div>
          )}

          {/* MODAL BANCA */}
          {showBank && (
              <div className="absolute bottom-12 left-1/2 -translate-x-1/2 md:left-20 md:translate-x-0 z-50 w-72">
                  <Win95Window title="CORPORATE_BANK.EXE" icon={Landmark} onClose={() => setShowBank(false)}>
                      <div className="p-2 bg-white m-1 border-2 border-gray-500 border-r-white border-b-white">
                          <div className="text-center font-bold border-b border-gray-400 pb-2 mb-2">CREDIT LINE MANAGEMENT</div>
                          <RetroStat label="MAX LEVERAGE" value={`$${maxLeverage}M`} color="black"/>
                          <RetroStat label="CURRENT DEBT" value={`$${debt.toFixed(1)}M`} color="red"/>
                          <div className="flex justify-between border-b border-gray-400 pb-1 mb-3">
                              <span className="text-xs font-bold text-gray-700">INTEREST RATE</span>
                              <span className={`font-mono font-bold text-lg ${currentInterestRate >= 0.05 ? 'text-red-600' : 'text-green-600'}`}>
                                  {(currentInterestRate*100).toFixed(1)}%
                                  {grimaniRateTurns > 0 && <span className="text-[10px] ml-1 text-blue-800">({grimaniRateTurns}mo left)</span>}
                              </span>
                          </div>
                          
                          <div className="space-y-2">
                              <RetroButton onClick={borrowMoney} disabled={debt + 50 > maxLeverage} className="!bg-green-100">BORROW $50M</RetroButton>
                              <div className="grid grid-cols-2 gap-2">
                                  <RetroButton onClick={() => repayDebt(50)} disabled={debt <= 0 || cash <= 0} className="!bg-red-100">REPAY $50M</RetroButton>
                                  <RetroButton onClick={() => repayDebt(debt)} disabled={debt <= 0 || cash <= 0} className="!bg-red-100">REPAY ALL</RetroButton>
                              </div>
                          </div>
                      </div>
                  </Win95Window>
              </div>
          )}

          {/* MODAL LIFESTYLE (STATUS SYMBOL) */}
          {showLifestyle && (
              <div className="absolute bottom-12 left-1/2 -translate-x-1/2 md:left-60 md:translate-x-0 z-50 w-80">
                  <Win95Window title="LIFESTYLE_CATALOG.EXE" icon={Gem} onClose={() => setShowLifestyle(false)}>
                      <div className="p-2 bg-[#c0c0c0] h-64 overflow-y-auto m-1 border-2 border-white border-r-gray-500 border-b-gray-500">
                          <div className="text-xs italic mb-2 text-center">Acquista beni per ridurre lo stress o ottenere vantaggi.</div>
                          
                          <div className="bg-white border border-gray-400 p-2 mb-2 flex justify-between items-center">
                              <div><div className="font-bold">Gold Watch</div><div className="text-[10px] text-gray-600">Passive: -1 Stress/mo</div></div>
                              {luxuries.watch ? <span className="text-green-700 font-bold text-xs">OWNED</span> : <button onClick={()=>purchaseLuxury('watch', 5, 'Gold Watch')} className="bg-[#c0c0c0] border-2 border-white border-r-black border-b-black px-2 py-1 text-xs font-bold font-mono">$5M</button>}
                          </div>

                          <div className="bg-white border border-gray-400 p-2 mb-2 flex justify-between items-center">
                              <div><div className="font-bold">Exclusive Club</div><div className="text-[10px] text-gray-600">20% chance Free Intel</div></div>
                              {luxuries.club ? <span className="text-green-700 font-bold text-xs">OWNED</span> : <button onClick={()=>purchaseLuxury('club', 25, 'Exclusive Club')} className="bg-[#c0c0c0] border-2 border-white border-r-black border-b-black px-2 py-1 text-xs font-bold font-mono">$25M</button>}
                          </div>

                          <div className="bg-white border border-gray-400 p-2 mb-2 flex justify-between items-center">
                              <div><div className="font-bold">Private Jet</div><div className="text-[10px] text-gray-600">Passive: -5 Stress/mo</div></div>
                              {luxuries.jet ? <span className="text-green-700 font-bold text-xs">OWNED</span> : <button onClick={()=>purchaseLuxury('jet', 50, 'Private Jet')} className="bg-[#c0c0c0] border-2 border-white border-r-black border-b-black px-2 py-1 text-xs font-bold font-mono">$50M</button>}
                          </div>

                          <div className="bg-white border border-gray-400 p-2 mb-2 flex justify-between items-center">
                              <div><div className="font-bold">Private Island</div><div className="text-[10px] text-gray-600">Passive: -15 Stress/mo</div></div>
                              {luxuries.island ? <span className="text-green-700 font-bold text-xs">OWNED</span> : <button onClick={()=>purchaseLuxury('island', 100, 'Private Island')} className="bg-[#c0c0c0] border-2 border-white border-r-black border-b-black px-2 py-1 text-xs font-bold font-mono">$100M</button>}
                          </div>
                      </div>
                  </Win95Window>
              </div>
          )}

          {showGraph && (
              <div className="absolute bottom-12 left-1/2 -translate-x-1/2 md:left-20 md:translate-x-0 w-80 z-50">
                  <Win95Window title="FINANCIAL TERMINAL" icon={LineChart} onClose={() => setShowGraph(false)}>
                      <div className="p-2 bg-black border-2 border-gray-600 text-green-500 font-mono text-xs m-1">
                          <div className="flex justify-between border-b border-green-800 pb-1 mb-2"><span>{marketInfo.exchange}</span><span>{currentDate}</span></div>
                          <div className="flex justify-between items-end mb-2">
                              <div><div className="text-[10px] text-green-700">LAST PRICE</div><div className="text-2xl font-bold">{marketInfo.currency}{stockPrice.toFixed(2)}</div></div>
                              <div className="text-right"><div className="text-[10px] text-green-700">SINCE IPO</div><div className={`text-lg font-bold ${stockPrice >= 10 ? 'text-green-400' : 'text-red-500'}`}>{((stockPrice - 10) * 10).toFixed(1)}%</div></div>
                          </div>
                          <StockGraph history={stockHistory} trend={marketTrend} />
                      </div>
                  </Win95Window>
              </div>
          )}

          {showAdvisor && (
              <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
                  <Win95Window title="CDA_MEETING.EXE" icon={Sparkles} onClose={() => setShowAdvisor(false)} className="max-w-md w-full shadow-2xl">
                      <div className="p-6 bg-black border border-gray-700 text-green-400 font-mono text-sm leading-relaxed">
                          <div className="mb-4 border-b border-green-800 pb-2 flex justify-between"><span className="animate-pulse">● SECURE LINE</span><span>v9.0</span></div>
                          {isAdvisorLoading ? <div className="text-center py-8 animate-pulse">CONNECTING...</div> : (
                              <div>
                                  <p className="mb-4 whitespace-pre-line">{advisorData}</p>
                                  <div className="mt-6 pt-4 border-t border-green-900 text-center"><RetroButton onClick={getAIAdvice} className="!w-auto inline-block">REQUEST MOTION</RetroButton></div>
                              </div>
                          )}
                      </div>
                  </Win95Window>
              </div>
          )}

          {showFinancials && (
            <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
              <Win95Window title="CONSOLIDATED_REPORT.XLS" icon={FileText} onClose={() => setShowFinancials(false)} className="max-w-lg w-full shadow-2xl h-3/4">
                 <div className="bg-white h-full overflow-y-auto p-6 m-1 border-2 border-gray-500 border-r-white border-b-white font-mono text-xs text-black">
                    <div className="text-center mb-6 border-b-2 border-black pb-2">
                        <h2 className="text-xl font-bold">CONSOLIDATED INCOME STATEMENT</h2>
                        <p>Period: {currentDate}</p>
                    </div>
                    
                    <div className="mb-6 space-y-1">
                        <div className="flex justify-between font-bold"><span>Base Revenue</span><span>${financials.rawRevenue.toFixed(2)}M</span></div>
                        {financials.cooBonusRevenue > 0 && (
                            <div className="flex justify-between text-green-700 font-bold"><span>COO Synergy Bonus (+{(financials.cooBonusRevenue / financials.rawRevenue * 100).toFixed(0)}%)</span><span>+${financials.cooBonusRevenue.toFixed(2)}M</span></div>
                        )}
                        <div className="flex justify-between font-bold border-t border-gray-400 pt-1 mt-1"><span>Total Revenue</span><span>${financials.totalRevenue.toFixed(2)}M</span></div>

                        <div className="pt-2"></div>
                        <div className="flex justify-between text-red-800"><span>Cost of Revenue (COGS)</span><span>(${financials.cogs.toFixed(2)}M)</span></div>
                        <div className="flex justify-between font-bold border-t border-gray-400 pt-1 mt-1"><span>Gross Profit</span><span>${financials.grossProfit.toFixed(2)}M</span></div>

                        <div className="pt-2"></div>
                        <div className="flex justify-between text-red-800"><span>Operating Expenses (OpEx)</span><span>(${financials.opEx.toFixed(2)}M)</span></div>
                        <div className="flex justify-between text-red-800"><span>SG&A (Staff Salaries)</span><span>(${financials.staffCost.toFixed(2)}M)</span></div>
                        <div className="flex justify-between font-bold border-t border-gray-400 pt-1 mt-1"><span>Operating Income (EBIT)</span><span>${financials.ebit.toFixed(2)}M</span></div>

                        <div className="pt-2"></div>
                        <div className="flex justify-between text-red-800"><span>Base Interest (@ {(financials.baseRate*100).toFixed(1)}%)</span><span>(${financials.baseInterest.toFixed(2)}M)</span></div>
                        {financials.cfoBonusRate > 0 && (
                            <div className="flex justify-between text-green-700 font-bold"><span>CFO Rate Reduction (-{(financials.cfoBonusRate*100).toFixed(1)}%)</span><span>+${financials.cfoInterestSaved.toFixed(2)}M</span></div>
                        )}
                        <div className="flex justify-between font-bold border-t border-gray-400 pt-1 mt-1"><span>Income Before Tax (EBT)</span><span>${financials.preTaxIncome.toFixed(2)}M</span></div>

                        <div className="pt-2"></div>
                        <div className="flex justify-between text-red-800"><span>Provision for Income Taxes (20%)</span><span>(${financials.tax.toFixed(2)}M)</span></div>

                        <div className="flex justify-between mt-3 border-t-4 border-black pt-2 font-black text-lg">
                            <span>NET INCOME</span>
                            <span className={financials.netIncome >= 0 ? "text-blue-800" : "text-red-800"}>
                                {financials.netIncome >= 0 ? '+' : '-'}${Math.abs(financials.netIncome).toFixed(2)}M
                            </span>
                        </div>
                    </div>
                 </div>
              </Win95Window>
            </div>
          )}

          {showPortfolioReport && (
              <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                  <Win95Window title="PORTFOLIO_ANALYSIS.TXT" icon={TableProperties} onClose={() => setShowPortfolioReport(false)} className="max-w-lg w-full shadow-2xl h-3/4">
                      <div className="bg-white h-full overflow-y-auto p-6 m-1 border-2 border-gray-500 border-r-white border-b-white font-mono text-xs text-black">
                          <div className="text-center mb-6 border-b-2 border-black pb-2"><h2 className="text-xl font-bold">ASSET REPORT</h2><p>{currentDate}</p></div>
                          <div className="mb-6">
                              <h3 className="font-bold border-b border-gray-400 mb-2">SECTOR ALLOCATION</h3>
                              {Object.keys(portfolioStats.sectors).length === 0 ? <p>No assets acquired.</p> : null}
                              {Object.entries(portfolioStats.sectors).map(([s,c])=><div key={s} className="flex justify-between"><span>{s}</span><span>{c} units</span></div>)}
                          </div>
                          <div className="mt-4 pt-4 border-t border-gray-400 flex justify-between font-bold">
                              <span>TOTAL PORTFOLIO REVENUE:</span><span>${portfolioStats.totalRevenue.toFixed(2)}M</span>
                          </div>
                      </div>
                  </Win95Window>
              </div>
          )}

          {showNewsPopup && activeNews && (
              <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                  <Win95Window title="NEWSWIRE FLASH" icon={Newspaper} onClose={() => setShowNewsPopup(false)} className="max-w-md w-full animate-in zoom-in">
                      <div className="p-4 bg-white text-black m-1 border-2 border-gray-500 border-r-white border-b-white">
                          <h2 className="text-xl font-black mb-2 text-red-600 uppercase border-b-2 border-red-600">{activeNews.title}</h2>
                          <p className="mb-4 font-serif">Reports indicate a shift in <b>{activeNews.sector}</b>.</p>
                          <div className="grid grid-cols-3 gap-2">
                              <RetroButton onClick={() => handleNewsDecision('SELL_ALL')}>SELL ALL</RetroButton>
                              <RetroButton onClick={() => handleNewsDecision('BUY_MORE')}>BUY</RetroButton>
                              <RetroButton onClick={() => handleNewsDecision('WAIT')}>WAIT</RetroButton>
                          </div>
                      </div>
                  </Win95Window>
              </div>
          )}

          {activeEvent && (
              <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                  <Win95Window title="CRITICAL ALERT" icon={AlertTriangle} className="max-w-md w-full shadow-2xl">
                      <div className="p-4 bg-[#c0c0c0] m-1 border-2 border-white border-r-gray-500 border-b-gray-500">
                          <h3 className="text-lg font-bold text-red-900 mb-1">{activeEvent.title}</h3>
                          <p className="text-sm text-black mb-4">{activeEvent.desc}</p>
                          <div className="space-y-2">{activeEvent.options.map((opt, i) => <RetroButton key={i} onClick={() => processEventOption(opt)}>{opt.label}</RetroButton>)}</div>
                      </div>
                  </Win95Window>
              </div>
          )}
      </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<TheSuccessor />);
</script>
</body>
</html>
